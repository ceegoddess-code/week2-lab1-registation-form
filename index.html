<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <form id="registerForm">
    <label>First Name: <input type="text" id="firstName" required /></label>
    <label>Last Name: <input type="text" id="lastName" required /></label>
    <label>Email: <input type="email" id="email" required /></label>
    <label>Password: <input type="password" id="password" minlength="6" required /></label>
    <label>Birthdate: <input type="date" id="birthdate" required /></label>
    
    <fieldset>
      <legend>Interests:</legend>
      <label><input type="checkbox" value="Coding" /> Coding</label>
      <label><input type="checkbox" value="Design" /> Design</label>
      <label><input type="checkbox" value="Gaming" /> Gaming</label>
    </fieldset>

    <button type="submit">Register</button>
  </form>

  <div id="output"></div>

  <script src="script.js"></script>
</body>
</html>
